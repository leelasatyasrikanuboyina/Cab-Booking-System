<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cab Booking System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Cab Booking System</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="login-container">

    <h2>User Registration</h2>

    <form id="registerForm">

        <label>Full Name</label><br>
        <input type="text" id="name" placeholder="Enter your name"><br><br>

        <label>Email</label><br>
        <input type="email" id="regEmail" placeholder="Enter your email"><br><br>

        <label>Phone Number</label><br>
        <input type="text" id="phone" placeholder="Enter your phone number"><br><br>

        <label>Password</label><br>
        <input type="password" id="regPassword" placeholder="Enter password"><br><br>

        <label>Confirm Password</label><br>
        <input type="password" id="confirmPassword" placeholder="Confirm password"><br><br>

        <button type="button" onclick="register()">Register</button>

    </form>

    <p>
        Already have an account?
        <a href="login.html">Login Here</a>
    </p>

</div>

<script src="js/script.js"></script>

</body>
</html>
